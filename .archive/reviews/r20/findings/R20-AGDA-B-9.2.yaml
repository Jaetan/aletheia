title: classifyStepResult Satisfied -> complete operational soundness gap
description: |
  Latent soundness gap in the streaming runtime.  Two related closures:

  (a) Cluster S (`637b2e0`, partial — documentation + lemmas):
      Discovery surfaced the `Internals.agda:225-238` 'stability argument'
      comment as factually wrong on two counts.  (1) Claim "Always/Release
      the only safety operators that yield Satisfied" -- false; Always proc
      never returns Satisfied.  (2) Claim "re-stepping after Satisfied
      always returns Satisfied or Continue" -- false; concrete witness
      `Until(Atomic 0)(Atomic 1)` produces a false `Violated` counterexample
      on a property already declared satisfied.  Cluster S shipped:
      (i) Comment rewrite at Internals.agda:225-238 accurately describing
      safe vs latent shapes; (ii) two provable step-level lemmas in
      Coalgebra/Properties.agda (stepL-always-never-satisfied +
      stepL-eventually-never-violated); (iii) new project memory
      project_classify_satisfied_soundness_gap.md documenting the gap.

  (b) Cluster W (`c40e3ba`, full operational fix):
      StepOutcome extended with `complete` constructor; classifyStepResult
      no longer re-evaluates after Satisfied.  Raw Until/Release/Atomic no
      longer emit false counterexamples post-Satisfied.
