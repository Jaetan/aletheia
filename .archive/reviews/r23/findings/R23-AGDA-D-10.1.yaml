resolution: |-
  Fixed in 050ba2f.  Promoted SignalPredicate signal names from List Char to the
  DBC Identifier record; the LTL-property JSON parser is now reason-carrying
  (parseProperty : JSON → ParseFail ⊎ _), deciding signal-name validity in ONE
  place (signalField → parseIdentifierField) — the forked second validity walk
  is removed.  Over-long → InputBoundExceeded IdentifierLength (preserves
  AGDA-D-32.1); bad charset / empty → ParseErr InvalidIdentifier.  The handler
  verdict→wire-error routing is proven in the new
  Protocol/Handlers/Properties.agda (constructor-pinning + wire-code lemmas,
  refl), wired into check-properties.  No per-binding behavior tests: the
  routing is binding-independent (kernel emits the same JSON for every caller),
  proven once kernel-side; the FFI error-envelope round-trip is already covered
  generically per binding.  Extractors still project .name, so the streaming hot
  path is unchanged — benchmark-neutral (Stream-LTL within ±10% session-distant
  band).  Validated: agda type-check + check-properties + build + check-{invariants,
  no-properties-in-runtime,erasure,fidelity,ffi-exports,bound-enforcement} all green.
