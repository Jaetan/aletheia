# Mutation Testing — per-binding SSOT.
#
# Single source of truth for the mutation lane.  AGENTS.md cat 14(g) gives the
# tooling and the canonical hot-path module list per binding; this file pins
# the actual on-disk paths (which drift from AGENTS.md prose when modules are
# split — e.g. Python `client.py` lives at `aletheia/client/_client.py` after
# the protocols split, `dbc_loader.py` was subsumed by `dbc/_converter.py` and
# `yaml_loader.py`).
#
# Static gate (`tools/check_mutation_setup.py`) verifies, for every binding,
# that the listed hot-path source files exist on disk.  Dynamic runner
# (`tools/mutation_run.py`) drives the per-binding tool against this list and
# archives the per-binding survivor count to `benchmarks/mutation/<short-sha>/`.
# Drift gate compares observed survivor count to the per-binding `baseline`
# below; new survivors above baseline = lane fails.
#
# Threshold model (advisor 2026-05-09): per-binding survivor BASELINE recorded
# here.  AGENTS.md cat 14(g) says "an unjustified survivor is a test gap";
# survivors above baseline are NEW findings, not initial-setup deliverables.  The
# initial population of this file is "infrastructure complete + baseline run".
# Eliminating the baseline survivors is a separate follow-up backlog (scope here
# is infrastructure, not survivor elimination).
#
# Forward-revert verification protocol:
#   1. Static gate: rename a hot-path file in this YAML to a non-existent
#      path → `tools/check_mutation_setup.py` fires with precise diagnostic.
#   2. Drift gate: introduce a redundant assertion that mutmut/Mull can
#      invert without breaking tests → next dynamic run records survivor
#      count > baseline → lane fails.

bindings:

  python:
    tool: mutmut
    version: ">=3.5,<4"
    install: |
      python/.venv/bin/pip install 'mutmut>=3.5,<4'
    hot_path:
      # AGENTS.md cat 14(g) Python list, mapped to actual on-disk paths.
      - python/aletheia/client/_client.py    # was AGENTS.md `client.py`; protocols split moved it
      - python/aletheia/dbc/_converter.py
      - python/aletheia/yaml_loader.py       # AGENTS.md `dbc_loader.py` was renamed/split
      - python/aletheia/codes/_issue.py      # CHECK 23 IssueCode mirror
      - python/aletheia/types.py
    config:
      # mutmut 3.x reads `[tool.mutmut]` from pyproject.toml in the cwd.
      # See python/pyproject.toml for the actual config (`source_paths`,
      # `pytest_add_cli_args_test_selection`, etc. — the mutmut 3.6 names;
      # the older `paths_to_mutate`/`tests_dir` are deprecated and warn).
      pyproject_section: "tool.mutmut"
    invocation: |
      cd python && ALETHEIA_LIB=$PWD/../build/libaletheia-ffi.so .venv/bin/mutmut run
    report: |
      cd python && ALETHEIA_LIB=$PWD/../build/libaletheia-ffi.so .venv/bin/mutmut results
    baseline:
      # Re-recorded 2026-06-10 after the survivor-elimination campaign drove the
      # Python lane from 215 survivors to ONE.  The earlier 215 (666 killed /
      # 22 no-tests, 76%) were real test gaps in the under-tested error/edge
      # branches of _client.py (format_dbc / format_dbc_text / validate_dbc /
      # _send_command guards), yaml_loader.py (every check-validation branch),
      # dbc/_converter.py (file wrappers), and types.py — all now killed by
      # behavioural tests (test_client_protocol_errors / test_client_lifecycle /
      # test_yaml_loader_errors / test_converter_paths / test_types_serialization).
      # Genuine equivalents are excluded via `# pragma: no mutate` (typing.cast
      # type-args, codec-name case on open/read_text/write_text, unreachable
      # defensive guards) or simplified away (redundant int / extended defaults).
      #
      # The single remaining survivor is a documented genuine equivalent that
      # mutmut cannot pragma-isolate: `dump_json`'s `ensure_ascii=False`→`None`
      # (None is falsy → json.dumps treats it identically to False).  mutmut
      # attributes a multi-line call-arg mutation to the call-open line, so a
      # per-arg pragma there would collaterally exclude the KILLABLE value /
      # cls / indent arg mutants — so it is documented here instead, keeping
      # those args mutation-tested (see aletheia/types.py:dump_json).  mutmut
      # mutmut 3.6: 827 killed / 1 survived, total 828 (score = killed /
      # (killed+survived) = 827/828 ≈ 99%).  The 3 previously-SEGFAULT mutants
      # (NULL state / payload reaching the FFI from _client._send_command and
      # format_dbc) are now CLEAN kills since the FFI-boundary NULL guards
      # (haskell-shim/src/AletheiaFFI.hs: isNullState / peekArrayChecked) turn a
      # NULL deref into an error response instead of a SIGSEGV — it was
      # 824 killed / 3 segfault / total 825 before that hardening.
      # The drift gate fails on survivor #2 — any NEW survivor is a finding.
      survivors: 1
      total_mutants: 828
      score_pct: 99
      run_at: "2026-06-15"

  go:
    # AGENTS.md cat 14(g) names `gomut` / `go-mutesting` / `mutate` as the Go
    # mutation tools.  zimmski/go-mutesting's last commit was 2021 and panics
    # on Go 1.26's go/types internals; avito-tech's fork doesn't resolve
    # multi-file packages cleanly.  `gremlins` (go-gremlins/gremlins) is the
    # actively-maintained successor; it covers the same mutation operators
    # and works on Go 1.26.  Documented as a substitution from AGENTS.md
    # cat 14(g) — same intent (per-binding mutation lane on Go hot-path).
    tool: gremlins
    install: |
      go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
    hot_path:
      # AGENTS.md cat 14(g) Go list, with substitutions for renamed/split files:
      # AGENTS.md `protocol.go` → actual `json.go` (request/response protocol marshaling)
      # AGENTS.md `frame.go`    → actual `enrich.go` (per-frame violation enrichment)
      - go/aletheia/client.go
      - go/aletheia/dbc.go
      - go/aletheia/json.go      # substitute for AGENTS.md `protocol.go`
      - go/aletheia/ffi.go       # matches AGENTS.md `ffi_*.go`
      - go/aletheia/ffi_nocgo.go # matches AGENTS.md `ffi_*.go`
      - go/aletheia/enrich.go    # substitute for AGENTS.md `frame.go`
    config: {}
    invocation: |
      cd go && gremlins unleash ./aletheia
    report: |
      # gremlins writes mutation summary to stdout: total runnable mutants,
      # killed, lived (survived), not-covered.  Runner parses tail summary.
    baseline:
      # Established 2026-05-09.
      # Zero survivors — every runnable mutant is killed by the existing
      # test suite.  120 "Not covered" mutants are on lines without test
      # coverage (gremlins counts them separately from runnable; see
      # AGENTS.md cat 14(g) "an unjustified survivor is a test gap").
      # The ZERO-survivor baseline is the strictest possible; any new
      # survivor on a future commit fails the lane.
      survivors: 0
      total_mutants: 662
      score_pct: 100
      run_at: "2026-05-09"

  cpp:
    tool: mull
    version: "0.34.0 LLVM-22"
    install: |
      # No prebuilt Mull deb ships for LLVM 22 (release debs stop at LLVM-15),
      # and we support only the latest stable Clang (22) — testing clang-19
      # mutants while shipping clang-22 is a real gap, not cosmetic, since UB
      # can change between compiler versions.  So Mull is built FROM SOURCE
      # against the system LLVM-22, cached in CI.  Grounded recipe:
      #   sudo apt install clang-22 llvm-22-dev      # system LLVM-22
      #   git clone --branch 0.34.0 https://github.com/mull-project/mull /tmp/mull
      #   cd /tmp/mull
      #   # Mull's MODULE.bazel OS map caps ubuntu:24.04 at LLVM-20 — add "22":
      #   sed -i 's/\("ubuntu:24.04": \[\)/\1"22", /' MODULE.bazel
      #   bazel build //rust/mull-tools:mull-runner-22 \
      #               //rust/mull-tools:mull-reporter-22 //:mull-ir-frontend-22
      #   # bazelisk reads .bazelversion (8.6.0); system LLVM via
      #   # new_local_repository(/usr/lib/llvm-22) — no LLVM download.
      #   cp bazel-bin/.../mull-{runner,reporter}-22 ~/.local/bin/
      #   cp bazel-bin/mull-ir-frontend-22           ~/.local/bin/
      # mull-runner / mull-reporter are Rust binaries; ir-frontend is a C++
      # clang plugin .so.  Full recipe + cache keys: pr-heavy-lanes.yml mutation
      # lane and memory/feedback_support_latest_toolchain.md.
    hot_path:
      # AGENTS.md cat 14(g) C++ list: `cpp/src/*.cpp` — Mull mutates all of
      # them via the `-fpass-plugin` clang option in the dedicated build tree.
      # `mock_backend.cpp` and `types.cpp` excluded (test-only / type defs).
      - cpp/src/backend.cpp
      - cpp/src/client.cpp
      - cpp/src/dbc.cpp
      - cpp/src/enrich.cpp
      - cpp/src/excel.cpp
      - cpp/src/ffi_backend.cpp
      - cpp/src/json_parse.cpp
      - cpp/src/json_serialize.cpp
      - cpp/src/yaml.cpp
    config:
      build_dir: cpp/build-mutation
      cmake_flag: ALETHEIA_MUTATION
      compiler: clang-22
      ir_plugin: ~/.local/bin/mull-ir-frontend-22
      runner: mull-runner-22
    invocation: |
      # The ALETHEIA_MUTATION build folds tests/integration_tests.cpp into the
      # unit_tests binary so the real FfiBackend (dlopen glue) is on the
      # mutation surface — those tests dlopen build/libaletheia-ffi.so, so
      # `cabal run shake -- build` must have produced it first.
      cd cpp && cmake -B build-mutation -DALETHEIA_MUTATION=ON \
        -DCMAKE_C_COMPILER=clang-22 -DCMAKE_CXX_COMPILER=clang++-22 \
        > /dev/null && \
        cmake --build build-mutation --target unit_tests && \
        mull-runner-22 ./build-mutation/unit_tests
    report: |
      # mull-runner-22 prints a per-mutant table to stdout; runner parses
      # the "Surviving mutants: N" / "Mutation score: P%" summary at the
      # tail.  Killed count derived from survived + score_pct.
    baseline:
      # Re-recorded 2026-06-11 under clang-22 / Mull 0.34.0 (LLVM-22) — ZERO
      # survivors, 60/60.  Re-baselined from the Mull-19 era (45 killed / 0):
      # the compiler version changes the mutation surface — clang-22 + Mull-22
      # generate 60 mutants where Mull-19 generated 45, concrete proof that
      # "test the clang-19 mutants while shipping clang-22" was a real gap.
      #
      # Two-part close.  (1) The Mull-19 survivor-elimination pass still holds:
      # json-lane value tests (negate / integer-division / timestamp boundary);
      # the parse_rational_dict den==0-after-sign-branch reorder + message test;
      # dropping no-observable-effect reserve() hints; and lifting the FfiBackend
      # RTS-init / FFI-error branches into pure unit-tested helpers
      # (src/detail/ffi_logic.cpp).  (2) NEW under clang-22: the Mock-only
      # unit_tests never executed ffi_backend.cpp, so Mull-22 reported its
      # mutants as UNCOVERED (Mull-19 silently omitted uncovered mutants, hence
      # the old 45).  Fix: fold tests/integration_tests.cpp into the mutation
      # binary (ALETHEIA_MUTATION-only) so the real FfiBackend runs.  That
      # auto-killed the dlsym/result null guards and the <=64 payload mutants
      # via normal ≤64-byte traffic; the four `>64`→`>=64`/`<=64` boundary
      # mutants (send_frame / extract-bin / extract-JSON / update — guards
      # behind the client's data.size()==dlc_to_bytes(dlc) pre-check, reachable
      # only at exactly 64) needed an exactly-64-byte CAN-FD call each — see
      # the "[boundary]" integration test.  This zero-survivor baseline is the
      # strictest possible floor — any new survivor on a future commit fails
      # the lane (matching the Go binding's standard above).
      survivors: 0
      total_mutants: 60
      score_pct: 100
      run_at: "2026-06-11"
