# SPDX-License-Identifier: BSD-2-Clause
#
# Phase 2 of the skipped-gate cleanup (Phase 1 = actionlint in pr-full-ci.yml).
# The three heavy opt-in lanes that `tools/run_ci.py` skips by default —
# reproducible-build, stability bench, mutation testing — run here as separate
# PARALLEL jobs, OFF the required sweep's critical path (ready-time = max, not
# sum).  Each invokes the lane TOOL directly (not `run_ci --<lane>`, which would
# redundantly re-run the whole ~36-min base sweep already covered by
# pr-full-ci.yml).
#
# Enforcement split (see docs/development/DEFERRED_ITEMS.md + BRANCH_PR_HYGIENE):
#   * reproducible-build — DETERMINISTIC (two clean builds, sha256 compare);
#     intended to become a REQUIRED check.  Runs on every PR event so the
#     required status always reflects the latest commit.
#   * mutation testing — REQUIRED (2026-06-20).  The drift gate is baseline-
#     relative (fails only on a collection crash OR observed survivors > the
#     recorded baseline), and this project's suite is deterministic (no physical
#     time in tests), so it is a stable merge-blocking signal — not "score-
#     squishy".  The lane already ran on every PR; advisory merely discarded a
#     signal we already paid to compute.  Add `mutation testing` to the `main`
#     branch ruleset's required checks to activate it (do so only after a
#     fresh-branch run confirms the seeded caches hit — see below).
#   * stability bench — ADVISORY (genuinely timing-flaky).  NOT required.
#   Each runs on EVERY PR commit-state (incl. synchronize) so the result
#   reflects the latest commit — a `synchronize`-skip froze them at the PR's
#   first (often broken) commit.  Per-job `cancel-in-progress` collapses rapid
#   PR iteration to ~one run on the settled state (AGENTS.md cat 14g's "once per
#   PR, not per-commit", via cancellation not a skip) — but push:main is EXEMPT
#   from cancellation so a rapid second merge cannot kill a cache-seeding run
#   before it saves.  `workflow_dispatch` remains for manual re-runs.
#
# Toolchain steps are copied verbatim from pr-full-ci.yml (same cache keys, so
# these jobs hit the Agda store that workflow already populated).  The workflow
# ALSO runs on push:main: the heavy caches (Mull-from-source, the build tree)
# are otherwise only written on feature branches, which do NOT cross-pollinate,
# so a fresh PR branch would miss them (cold ~33-min mutation run).  A push:main
# run writes those caches under the default branch, where every PR branch can
# read them — turning the cold Mull build (318s) + .so build (338s) into hits.

name: Heavy lanes (PR)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GHC_VERSION: '9.6.7'
  AGDA_VERSION: '2.8.0'
  STDLIB_VERSION: 'v2.3'

jobs:
  # ── Lane 1: reproducible-build (REQUIRED-intended; deterministic) ──────────
  # Self-building: tools.check_reproducible_build runs `cabal run shake -- build`
  # twice and compares sha256(build/libaletheia-ffi.so).  Needs only the Agda
  # toolchain + a 3.14 python to invoke the tool (no venv extras, no C++/Go).
  reproducible-build:
    name: reproducible-build
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    # Runs on every PR commit-state AND on push:main (to seed the build caches —
    # see the header).  Push-iteration hygiene: a new PR commit cancels the stale
    # repro run (push:main is exempt, below).  Its OWN group, so it never cancels
    # the stability / mutation lanes below.
    concurrency:
      group: heavy-repro-${{ github.event.pull_request.number || github.ref }}
      # push:main is exempt — a seeding run must not be cancelled before it saves.
      cancel-in-progress: ${{ github.event_name != 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up GHC + cabal
        run: |
          set -euo pipefail
          echo "CABAL_DIR=${HOME}/.cabal" >> "${GITHUB_ENV}"
          export CABAL_DIR="${HOME}/.cabal"
          sudo chown -R "$(id -un):$(id -gn)" /usr/local/.ghcup 2>/dev/null || true
          ghcup install ghc "${GHC_VERSION}" --set
          ghcup install cabal 3.12.1.0 --set
          cabal update
          echo "${HOME}/.cabal/bin" >> "${GITHUB_PATH}"
          echo "${HOME}/.ghcup/bin" >> "${GITHUB_PATH}"

      - name: Restore cabal store (Agda library + executable + deps)
        id: cabal-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            ~/.cabal/bin
          key: cabal-${{ runner.os }}-ghc${{ env.GHC_VERSION }}-agda${{ env.AGDA_VERSION }}-v2

      - name: Install Agda ${{ env.AGDA_VERSION }} (binary + store library)
        run: cabal install "Agda-${AGDA_VERSION}" --overwrite-policy=always

      - name: Save cabal store (only on a cache miss)
        if: steps.cabal-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            ~/.cabal/bin
          key: cabal-${{ runner.os }}-ghc${{ env.GHC_VERSION }}-agda${{ env.AGDA_VERSION }}-v2

      - name: Cache agda-stdlib ${{ env.STDLIB_VERSION }}
        uses: actions/cache@v5
        with:
          path: ~/.agda/agda-stdlib
          key: agda-stdlib-${{ env.STDLIB_VERSION }}

      - name: Install + register agda-stdlib ${{ env.STDLIB_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p ~/.agda
          if [ ! -d ~/.agda/agda-stdlib/.git ]; then
            git clone --depth 1 --branch "${STDLIB_VERSION}" \
              https://github.com/agda/agda-stdlib.git ~/.agda/agda-stdlib
          fi
          echo "${HOME}/.agda/agda-stdlib/standard-library.agda-lib" > ~/.agda/libraries
          echo "standard-library" > ~/.agda/defaults

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Reproducible-build hash gate (two clean builds, sha256 compare)
        run: python3 -m tools.check_reproducible_build

  # ── Lane 2: stability bench (ADVISORY; once per PR) ────────────────────────
  stability:
    name: stability bench (advisory)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    # Runs on every PR commit-state (so the advisory result reflects the latest
    # commit) AND on push:main (to seed the build caches — see the header).
    # cancel-in-progress collapses rapid PR iteration to ~one run on the settled
    # state; push:main is exempt (below).  Own group so it never cancels the
    # repro / mutation lanes.
    concurrency:
      group: heavy-stability-${{ github.event.pull_request.number || github.ref }}
      # push:main is exempt — a seeding run must not be cancelled before it saves.
      cancel-in-progress: ${{ github.event_name != 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up GHC + cabal
        run: |
          set -euo pipefail
          echo "CABAL_DIR=${HOME}/.cabal" >> "${GITHUB_ENV}"
          export CABAL_DIR="${HOME}/.cabal"
          sudo chown -R "$(id -un):$(id -gn)" /usr/local/.ghcup 2>/dev/null || true
          ghcup install ghc "${GHC_VERSION}" --set
          ghcup install cabal 3.12.1.0 --set
          cabal update
          echo "${HOME}/.cabal/bin" >> "${GITHUB_PATH}"
          echo "${HOME}/.ghcup/bin" >> "${GITHUB_PATH}"

      - name: Restore cabal store (Agda library + executable + deps)
        id: cabal-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            ~/.cabal/bin
          key: cabal-${{ runner.os }}-ghc${{ env.GHC_VERSION }}-agda${{ env.AGDA_VERSION }}-v2

      - name: Install Agda ${{ env.AGDA_VERSION }} (binary + store library)
        run: cabal install "Agda-${AGDA_VERSION}" --overwrite-policy=always

      - name: Save cabal store (only on a cache miss)
        if: steps.cabal-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            ~/.cabal/bin
          key: cabal-${{ runner.os }}-ghc${{ env.GHC_VERSION }}-agda${{ env.AGDA_VERSION }}-v2

      - name: Cache agda-stdlib ${{ env.STDLIB_VERSION }}
        uses: actions/cache@v5
        with:
          path: ~/.agda/agda-stdlib
          key: agda-stdlib-${{ env.STDLIB_VERSION }}

      - name: Install + register agda-stdlib ${{ env.STDLIB_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p ~/.agda
          if [ ! -d ~/.agda/agda-stdlib/.git ]; then
            git clone --depth 1 --branch "${STDLIB_VERSION}" \
              https://github.com/agda/agda-stdlib.git ~/.agda/agda-stdlib
          fi
          echo "${HOME}/.agda/agda-stdlib/standard-library.agda-lib" > ~/.agda/libraries
          echo "standard-library" > ~/.agda/defaults

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Create the dev venv (python/.venv)
        run: |
          set -euo pipefail
          python3.14 -m venv python/.venv
          python/.venv/bin/pip install --upgrade pip
          python/.venv/bin/pip install -e 'python/.[dev]'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: |
            go/go.sum
            go/excel/go.sum

      - name: Cache clang-22 .debs (Clang is a large download)
        uses: actions/cache@v5
        with:
          path: ~/llvm-cache
          key: clang22-noble-v1
      # ubuntu-24.04 pre-installs only clang ≤19; install clang-22 (the supported
      # toolchain) from apt.llvm.org.  The cmake step below invokes clang-22
      # explicitly, so no update-alternatives is needed.
      - name: Install C++ toolchain (clang-22 from apt.llvm.org)
        run: |
          set -euo pipefail
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm22.list >/dev/null
          sudo apt-get update
          mkdir -p ~/llvm-cache
          if [ -z "$(ls -A ~/llvm-cache 2>/dev/null)" ]; then
            sudo apt-get install -y --download-only \
              -o Dir::Cache::archives="${HOME}/llvm-cache" \
              clang-22 clang-tidy-22 libstdc++-14-dev
            sudo chown -R "$(id -u):$(id -g)" ~/llvm-cache
          fi
          sudo dpkg -i ~/llvm-cache/*.deb || sudo apt-get -f install -y

      # stability_run errors if these are absent (build/libaletheia-ffi.so and
      # cpp/build/stability_bench).  Build them up front; the Go harness is
      # built/run by the runner itself.
      - name: Build the FFI library + C++ stability harness
        run: |
          set -euo pipefail
          cabal run shake -- build
          # -S cpp: the CMakeLists.txt lives in cpp/, not the repo root (the
          # default source dir when only -B is given).  The first run failed
          # with "source directory does not contain CMakeLists.txt".
          cmake -S cpp -B cpp/build -DCMAKE_C_COMPILER=clang-22 -DCMAKE_CXX_COMPILER=clang++-22 > /dev/null
          cmake --build cpp/build --target stability_bench

      - name: Stability bench (advisory)
        env:
          ALETHEIA_STABILITY_CHECK: '1'
        run: python/.venv/bin/python3 -m tools.stability_run

  # ── Lane 3: mutation testing (REQUIRED; once per PR) ───────────────────────
  # The drift gate (tools/mutation_run.py) fails on a collection crash OR
  # observed survivors > the docs/MUTATION_BENCH.yaml baseline, across all three
  # bindings (mutmut / gremlins / Mull).  Add `mutation testing` to the main
  # branch ruleset's required checks to make it merge-blocking.
  mutation:
    name: mutation testing
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    # Runs on every PR commit-state (so the required result reflects the latest
    # commit) AND on push:main (to seed the build caches — see the header).
    # cancel-in-progress collapses rapid PR iteration to ~one run on the settled
    # state; push:main is exempt (below).  Own group so it never cancels the
    # repro / stability lanes.
    concurrency:
      group: heavy-mutation-${{ github.event.pull_request.number || github.ref }}
      # push:main is exempt — a seeding run must not be cancelled before it saves.
      cancel-in-progress: ${{ github.event_name != 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up GHC + cabal
        run: |
          set -euo pipefail
          echo "CABAL_DIR=${HOME}/.cabal" >> "${GITHUB_ENV}"
          export CABAL_DIR="${HOME}/.cabal"
          sudo chown -R "$(id -un):$(id -gn)" /usr/local/.ghcup 2>/dev/null || true
          ghcup install ghc "${GHC_VERSION}" --set
          ghcup install cabal 3.12.1.0 --set
          cabal update
          echo "${HOME}/.cabal/bin" >> "${GITHUB_PATH}"
          echo "${HOME}/.ghcup/bin" >> "${GITHUB_PATH}"

      - name: Restore cabal store (Agda library + executable + deps)
        id: cabal-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            ~/.cabal/bin
          key: cabal-${{ runner.os }}-ghc${{ env.GHC_VERSION }}-agda${{ env.AGDA_VERSION }}-v2

      - name: Install Agda ${{ env.AGDA_VERSION }} (binary + store library)
        run: cabal install "Agda-${AGDA_VERSION}" --overwrite-policy=always

      - name: Save cabal store (only on a cache miss)
        if: steps.cabal-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            ~/.cabal/bin
          key: cabal-${{ runner.os }}-ghc${{ env.GHC_VERSION }}-agda${{ env.AGDA_VERSION }}-v2

      - name: Cache agda-stdlib ${{ env.STDLIB_VERSION }}
        uses: actions/cache@v5
        with:
          path: ~/.agda/agda-stdlib
          key: agda-stdlib-${{ env.STDLIB_VERSION }}

      - name: Install + register agda-stdlib ${{ env.STDLIB_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p ~/.agda
          if [ ! -d ~/.agda/agda-stdlib/.git ]; then
            git clone --depth 1 --branch "${STDLIB_VERSION}" \
              https://github.com/agda/agda-stdlib.git ~/.agda/agda-stdlib
          fi
          echo "${HOME}/.agda/agda-stdlib/standard-library.agda-lib" > ~/.agda/libraries
          echo "standard-library" > ~/.agda/defaults

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Create the dev venv with the [mutation] extra (mutmut)
        run: |
          set -euo pipefail
          python3.14 -m venv python/.venv
          python/.venv/bin/pip install --upgrade pip
          python/.venv/bin/pip install -e 'python/.[dev,mutation]'

      - name: Set up Go + gremlins
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: |
            go/go.sum
            go/excel/go.sum

      - name: Install gremlins (Go mutation tool)
        run: |
          set -euo pipefail
          go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Cache clang-22 + LLVM-22-dev .debs (large download)
        uses: actions/cache@v5
        with:
          path: ~/llvm-cache
          key: clang22-llvm22dev-noble-v1
      # ubuntu-24.04 pre-installs only clang ≤19; install clang-22 (the supported
      # toolchain) + the LLVM-22 dev libraries (needed to build Mull from source)
      # from apt.llvm.org.  mutation_run.py invokes clang-22 explicitly.
      - name: Install C++ toolchain + LLVM-22 dev (apt.llvm.org)
        run: |
          set -euo pipefail
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm22.list >/dev/null
          sudo apt-get update
          mkdir -p ~/llvm-cache
          if [ -z "$(ls -A ~/llvm-cache 2>/dev/null)" ]; then
            sudo apt-get install -y --download-only \
              -o Dir::Cache::archives="${HOME}/llvm-cache" \
              clang-22 libstdc++-14-dev llvm-22-dev libclang-22-dev
            sudo chown -R "$(id -u):$(id -g)" ~/llvm-cache
          fi
          sudo dpkg -i ~/llvm-cache/*.deb || sudo apt-get -f install -y

      # No prebuilt Mull deb exists for LLVM 19-22 (the latest deb is LLVM-15),
      # and the supported toolchain is clang-22 — UB can differ by compiler
      # version, so the mutation lane MUST test clang-22 codegen.  Build Mull
      # from source against the system LLVM-22 (Bazel; uses /usr/lib/llvm-22).
      # Cached so it is a one-time cost per (Mull tag, LLVM version).  Validated
      # locally 2026-06-11: the mutation lane runs green under clang-22 + Mull-22.
      - name: Cache Mull-22 (built from source vs LLVM-22)
        id: mull22
        uses: actions/cache@v5
        with:
          path: ~/mull-bin
          key: mull22-0.34.0-llvm22-noble-v1
      - name: Build Mull-22 from source (cache miss)
        if: steps.mull22.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.local/bin"
          # bazelisk reads Mull's .bazelversion (8.6.0)
          curl -fsSL --retry 5 --retry-all-errors -o "${HOME}/.local/bin/bazel" \
            https://github.com/bazelbuild/bazelisk/releases/download/v1.27.0/bazelisk-linux-amd64
          chmod +x "${HOME}/.local/bin/bazel"
          git clone --depth 1 --branch 0.34.0 --recursive \
            https://github.com/mull-project/mull /tmp/mull
          # Mull's MODULE.bazel caps ubuntu:24.04 at LLVM-20; insert "22" into the
          # ubuntu:24.04 list (we installed /usr/lib/llvm-22 above).
          sed -i 's/        "ubuntu:24.04": \[/        "ubuntu:24.04": [\n            "22",/' \
            /tmp/mull/MODULE.bazel
          ( cd /tmp/mull && "${HOME}/.local/bin/bazel" build \
              //rust/mull-tools:mull-runner-22 \
              //rust/mull-tools:mull-reporter-22 \
              //:mull-ir-frontend-22 )
          mkdir -p "${HOME}/mull-bin"
          cp -L /tmp/mull/bazel-bin/rust/mull-tools/mull-runner-22   "${HOME}/mull-bin/"
          cp -L /tmp/mull/bazel-bin/rust/mull-tools/mull-reporter-22 "${HOME}/mull-bin/"
          cp -L /tmp/mull/bazel-bin/mull-ir-frontend-22             "${HOME}/mull-bin/"
      - name: Install Mull-22 to PATH
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.local/bin"
          cp "${HOME}/mull-bin/"mull-* "${HOME}/.local/bin/"
          chmod +x "${HOME}/.local/bin/mull-runner-22" "${HOME}/.local/bin/mull-reporter-22"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      # Restore the build tree (Agda .agdai + MAlonzo .hs + the copied .so, plus
      # the shake-exe root dist-newstyle) so `cabal run shake -- build` below is a
      # Shake NO-OP when the PR touches no Agda source — the common case (a
      # Python/Go/C++/docs PR doesn't change the .so), turning the cold ~338s
      # build into seconds.  An Agda-changing PR still recompiles via cabal
      # (haskell-shim/dist-newstyle, the 194 MB .o tree, is intentionally NOT
      # cached — same as pr-full-ci.yml; keeps the cache small per the 10 GB LRU
      # budget).  Shares pr-full-ci.yml's key (SAME tree, seeded on push:main, so
      # a fresh PR branch reads it via the restore-keys prefix); safe to share —
      # Shake keys on content and `build` errors on a stale tree, so it never
      # ships stale.  NOT ccache: the Mull `-fpass-plugin` C++ compile is left
      # cold (ccache cannot content-hash the plugin binary -> stale-object risk).
      - name: Restore incremental build tree (build/ + dist-newstyle/)
        id: build-tree-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            build
            dist-newstyle
          key: build-tree-${{ runner.os }}-ghc${{ env.GHC_VERSION }}-agda${{ env.AGDA_VERSION }}-stdlib${{ env.STDLIB_VERSION }}-${{ github.sha }}
          restore-keys: |
            build-tree-${{ runner.os }}-ghc${{ env.GHC_VERSION }}-agda${{ env.AGDA_VERSION }}-stdlib${{ env.STDLIB_VERSION }}-

      - name: Build the FFI library (needed by mutmut / Mull / gremlins lanes)
        run: cabal run shake -- build

      - name: Mutation testing across the three bindings (required)
        env:
          ALETHEIA_MUTATION_CHECK: '1'
        run: python/.venv/bin/python3 -m tools.mutation_run

      # Seed the build tree so push:main writes it under the default branch for
      # fresh PR branches to restore.  NOT gated to pull_request (push:main is
      # the seeding event); `!cancelled()` avoids saving a truncated tree; skip
      # when the exact-sha key already exists (a re-run / the sibling workflow
      # saved first — GHA cache keys are immutable).
      - name: Save incremental build tree
        if: ${{ !cancelled() && steps.build-tree-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            build
            dist-newstyle
          key: build-tree-${{ runner.os }}-ghc${{ env.GHC_VERSION }}-agda${{ env.AGDA_VERSION }}-stdlib${{ env.STDLIB_VERSION }}-${{ github.sha }}
