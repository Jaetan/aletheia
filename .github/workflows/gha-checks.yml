# GHA infrastructure checks — meta-gates that have no offline equivalent.
#
# Aletheia's CI is local-first (see docs/development/CI_LOCAL.md): the
# correctness sweep runs offline via tools/run_ci.py + the pre-push hook.
# This workflow is intentionally narrow — it verifies the GHA infrastructure
# itself (workflow YAML lint, action-pin policy, workflow-permissions
# hygiene) and does NOT duplicate the offline correctness gates.
#
# Three jobs run in parallel.  Total wall-clock ~1-2 min on `ubuntu-24.04`.

name: GHA infrastructure checks

on:
  push:
  pull_request:

# Read-only by default; override per-job only if needed.
permissions:
  contents: read

# Cancel in-progress runs of this workflow when a new commit lands on the
# same PR ref — saves Actions minutes on rapid PR push sequences.  Pushes to
# mainline refs (`refs/heads/main`, `refs/heads/review-*`) are NOT cancelled
# so that the mainline build always completes (silent cancel of a mainline
# build would mask regressions per R23 CICD-1.2).
concurrency:
  group: gha-checks-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    name: Lint workflow YAML (actionlint)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: '1.7.7'
          # SHA-256 of actionlint_1.7.7_linux_amd64.tar.gz from upstream's
          # signed `actionlint_1.7.7_checksums.txt` (verified against
          # https://github.com/rhysd/actionlint/releases/tag/v1.7.7).  Per
          # CICD-1.7: the tool that enforces SHA-pin policy on third-party
          # actions must itself be fetched verifiably.  Refresh both
          # ACTIONLINT_VERSION and ACTIONLINT_SHA256 on version bumps.
          ACTIONLINT_SHA256: '023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757'
        run: |
          set -euo pipefail
          curl -fsSLO "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" | sha256sum -c -
          tar xzf "actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" actionlint
          chmod +x actionlint
          ./actionlint --version

      - name: Run actionlint
        run: ./actionlint -color

  action-pins:
    name: Verify action-pin policy
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run check_action_pins.py
        run: python3 tools/check_action_pins.py

  permissions-check:
    name: Verify minimal workflow permissions
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run check_workflow_permissions.py
        run: python3 tools/check_workflow_permissions.py
