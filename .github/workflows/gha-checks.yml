# GHA infrastructure checks — meta-gates that have no offline equivalent.
#
# Aletheia's CI is local-first (see docs/development/CI_LOCAL.md): the
# correctness sweep runs offline via tools/run-ci.sh + the pre-push hook.
# This workflow is intentionally narrow — it verifies the GHA infrastructure
# itself (workflow YAML lint) and does NOT duplicate the offline correctness
# gates.
#
# Phase 5 ships only the actionlint job.  Phase 6 will add action-pin
# verification and workflow-permissions hygiene as additional jobs once the
# offline counterpart scripts (tools/check-action-pins.sh,
# tools/check-workflow-permissions.sh) are in place.
#
# Triggers: every push and every PR.  Wall-clock ~30s on `ubuntu-latest`.

name: GHA infrastructure checks

on:
  push:
  pull_request:

# Read-only by default; override per-job only if needed.
permissions:
  contents: read

jobs:
  actionlint:
    name: Lint workflow YAML (actionlint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: '1.7.7'
        run: |
          set -euo pipefail
          curl -fsSLO "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar xzf "actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" actionlint
          chmod +x actionlint
          ./actionlint --version

      - name: Run actionlint
        run: ./actionlint -color
