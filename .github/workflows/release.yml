# SPDX-License-Identifier: BSD-2-Clause
#
# Tag-triggered release automation.  Builds the reproducible distribution
# tarball via `cabal run shake -- dist`, the native packages (.deb + .rpm)
# via `cabal run shake -- packages`, and the runtime container image, then
# publishes the artifacts to a GitHub Release and the image to GHCR.
#
# Signing is KEYLESS (Sigstore / GitHub Actions ambient OIDC → short-lived
# Fulcio certificate + Rekor transparency log): no signing key or passphrase
# ever lives in CI.  The signing key stays in the maintainer's local keyring
# for local/out-of-band releases (docs/development/RELEASE.md).
#
# Triggers:
#   * push of a `v*` tag  → build + keyless-sign + self-verify + publish a DRAFT
#     release (the maintainer flips it public after a look), then push + sign
#     the container image on GHCR.
#   * workflow_dispatch   → build + keyless-sign + self-verify as a DRY-RUN,
#     WITHOUT publishing or pushing — the acceptance test for this pipeline.
#
# Publish is gated on the self-verify steps (an artifact that does not verify
# against this workflow's own OIDC identity is never released — the loop
# covers EVERY signed artifact: tarball, .deb, .rpm), a functional bundle
# smoke test (unpack → source env.sh → load the .so from the bundled Python
# package), the cross-binding bundle validation (tools/bundle_validate.py
# builds + runs a real consumer per compiled binding from the recipes the
# bundled installers print), a real `dpkg -i` install smoke of the .deb, and
# the runtime-image build (whose in-Dockerfile verify stages build/load every
# compiled binding against the image's own /opt/aletheia).  Each matches the
# repo rule that a gate which cannot fail has a bug.
#
# Ordering: every artifact — tarball, packages, image — is built AND verified
# BEFORE anything is published anywhere, so a failure leaves nothing
# half-published.  The GHCR push runs AFTER the Release publish: the draft
# Release is the reviewable anchor, and a failed push can be retried
# idempotently, whereas an image pushed for a release that then failed to
# publish would be live-but-orphaned (GHCR has no draft state).  Residual:
# GHCR versions are pullable immediately on push (no draft gate) — accepted,
# because the push only happens after every verification gate has passed.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: build + keyless-sign + publish
    runs-on: ubuntu-24.04
    # The runtime-image build (in-Dockerfile verify stages: Go + Rust + C++
    # with clang-22) and the native-package build sit on top of the ~35 min
    # dist + validation pipeline, so this lane needs more headroom than the
    # PR lanes.
    timeout-minutes: 90
    permissions:
      contents: write   # create the Release + upload assets (tag pushes only)
      id-token: write   # mint the ambient OIDC token for keyless Sigstore signing
      packages: write   # push the runtime image to GHCR (tag pushes only)
    env:
      GHC_VERSION: '9.6.7'
      AGDA_VERSION: '2.8.0'
      STDLIB_VERSION: 'v2.3'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          # `shake dist` derives the reproducible tarball mtime + SBOM epoch from
          # `git log -1 --format=%ct HEAD`, so the commit must be reachable.
          fetch-depth: 0

      - name: Set up GHC + cabal
        run: |
          set -euo pipefail
          # Pin the legacy ~/.cabal layout so the cache path + PATH agree (see
          # pr-full-ci.yml for the full rationale).
          echo "CABAL_DIR=${HOME}/.cabal" >> "${GITHUB_ENV}"
          export CABAL_DIR="${HOME}/.cabal"
          sudo chown -R "$(id -un):$(id -gn)" /usr/local/.ghcup 2>/dev/null || true
          ghcup install ghc "${GHC_VERSION}" --set
          ghcup install cabal 3.12.1.0 --set
          echo "${HOME}/.cabal/bin" >> "${GITHUB_PATH}"
          echo "${HOME}/.ghcup/bin" >> "${GITHUB_PATH}"

      - name: Restore cabal store (Agda library + executable + deps)
        id: cabal-cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            ~/.cabal/bin
          key: cabal-${{ runner.os }}-ghc${{ env.GHC_VERSION }}-agda${{ env.AGDA_VERSION }}-v2

      - name: Update cabal package index (only on a cabal-store cache miss)
        if: steps.cabal-cache.outputs.cache-hit != 'true'
        run: cabal update

      - name: Install Agda ${{ env.AGDA_VERSION }} (binary + store library)
        run: cabal install "Agda-${AGDA_VERSION}" --overwrite-policy=always

      - name: Save cabal store (persists the Agda build even if a later step fails)
        if: steps.cabal-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            ~/.cabal/bin
          key: cabal-${{ runner.os }}-ghc${{ env.GHC_VERSION }}-agda${{ env.AGDA_VERSION }}-v2

      - name: Cache agda-stdlib ${{ env.STDLIB_VERSION }}
        uses: actions/cache@v6
        with:
          path: ~/.agda/agda-stdlib
          key: agda-stdlib-${{ env.STDLIB_VERSION }}

      - name: Install + register agda-stdlib ${{ env.STDLIB_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p ~/.agda
          if [ ! -d ~/.agda/agda-stdlib/.git ]; then
            git clone --depth 1 --branch "${STDLIB_VERSION}" \
              https://github.com/agda/agda-stdlib.git ~/.agda/agda-stdlib
          fi
          echo "${HOME}/.agda/agda-stdlib/standard-library.agda-lib" > ~/.agda/libraries
          echo "standard-library" > ~/.agda/defaults

      - name: Set up Python 3.14
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Create the dev venv (python/.venv)
        run: |
          set -euo pipefail
          # `shake dist` runs tools.sbom_generate under this venv.
          python3.14 -m venv python/.venv
          python/.venv/bin/pip install --upgrade pip
          python/.venv/bin/pip install -e 'python/.[dev]'

      - name: Install cosign (SHA-pinned)
        env:
          # Keep in sync with docs/development/RELEASE.md + keys/README.md.
          COSIGN_VERSION: '2.4.1'
          COSIGN_SHA256: '8b24b946dd5809c6bd93de08033bcf6bc0ed7d336b7785787c080f574b89249b'
        run: |
          set -euo pipefail
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 3 -o /tmp/cosign \
            "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign-linux-amd64"
          echo "${COSIGN_SHA256}  /tmp/cosign" | sha256sum -c -
          sudo install -m 0755 /tmp/cosign /usr/local/bin/cosign
          rm /tmp/cosign
          cosign version

      - name: Build + keyless-sign the distribution tarball
        env:
          # Selects the Shakefile's keyless sign branch; cosign auto-detects the
          # ambient GitHub Actions OIDC token (id-token: write above).  No key.
          ALETHEIA_COSIGN_KEYLESS: '1'
        run: cabal run shake -- dist

      - name: Self-verify the signed tarball (gates publish)
        run: |
          set -euo pipefail
          # GITHUB_WORKFLOW_REF is the exact identity Fulcio put in the cert:
          #   tag push → Jaetan/aletheia/.github/workflows/release.yml@refs/tags/vX.Y.Z
          #   dispatch → Jaetan/aletheia/.github/workflows/release.yml@refs/heads/main
          # The signature must verify against THAT identity or we do not publish.
          cosign verify-blob \
            --certificate dist/aletheia.tar.gz.crt \
            --signature dist/aletheia.tar.gz.sig \
            --certificate-identity "https://github.com/${GITHUB_WORKFLOW_REF}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            dist/aletheia.tar.gz
          echo "Self-verify OK — signature matches this workflow's OIDC identity."

      - name: Smoke-test the bundle (unpack, source env.sh from a foreign cwd, load the .so)
        run: |
          set -euo pipefail
          # Functional gate: a presence-only check passes on a bundle that cannot
          # run.  Unpack, run install.sh, then from a DIFFERENT cwd source env.sh
          # (proving ALETHEIA_LIB resolves ABSOLUTE), install the bundled Python
          # package into an ISOLATED target dir (`pip install --target`, not a
          # venv — the pure-ctypes package has no deps, and this keeps the repo's
          # single-venv convention intact / satisfies check_venv_convention), and
          # construct a real FFIBackend — exercising the whole chain env.sh ->
          # absolute ALETHEIA_LIB -> _validate_lib_path -> dlopen -> GHC RTS.
          # Python needs no compiler, so it runs right here; the compiled
          # wrappers (C++/Go/Rust) are exercised from the bundle by the
          # validation step below.
          work="$(mktemp -d)"
          tar xzf dist/aletheia.tar.gz -C "${work}"
          bundle="${work}/aletheia"
          bash "${bundle}/install.sh" >/dev/null
          python3.14 -m pip install --quiet --target "${work}/site" "${bundle}/bindings/python"
          (
            cd /tmp
            # shellcheck disable=SC1091
            source "${bundle}/env.sh"
            case "${ALETHEIA_LIB}" in
              /*) : ;;
              *) echo "ALETHEIA_LIB is not absolute: ${ALETHEIA_LIB}" >&2; exit 1 ;;
            esac
            PYTHONPATH="${work}/site" python3.14 -c 'import aletheia; from aletheia import FFIBackend, AletheiaClient; print("bundle import OK", aletheia.__version__); FFIBackend(); AletheiaClient(); print("bundle smoke OK: env.sh -> ALETHEIA_LIB -> .so load -> client")'
          )

      # ── Bundle validation across the compiled bindings (gates publish) ──────
      # tools/bundle_validate.py unpacks dist/aletheia.tar.gz, runs the bundled
      # installers capturing their printed per-language recipes, EXECUTES those
      # exact recipe lines (the recipes users read are the recipes CI runs),
      # and drives one consumer program per compiled binding through the
      # verified kernel: env-constructor -> parse a real .dbc -> LTL property
      # -> conforming + violating frame -> exactly one violation.  --require
      # turns a missing-toolchain skip into a failure, so the toolchain steps
      # below are load-bearing.  They are copied from pr-full-ci.yml with the
      # same cache keys, so the caches seeded there are shared.
      - name: Set up Go (bundle consumer toolchain)
        uses: actions/setup-go@v7
        with:
          go-version: 'stable'
          cache-dependency-path: |
            go/go.sum
            go/excel/go.sum

      # The runner ships rustup; a stable toolchain with the minimal profile is
      # all the consumer build needs (no clippy/rustfmt here — the consumer is
      # built, not linted).
      - name: Set up Rust (stable, minimal — bundle consumer toolchain)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version && cargo --version

      - name: Cache clang-22 .debs (Clang is a large download)
        uses: actions/cache@v6
        with:
          path: ~/llvm-cache
          key: clang22-noble-v1
      # ubuntu-24.04 pre-installs only clang ≤19; the bundled C++ binding
      # enforces Clang (cpp/CMakeLists.txt), so install clang-22 (the supported
      # toolchain) from apt.llvm.org.  Same package set + cache key as
      # pr-full-ci.yml so this workflow shares the deb cache seeded there.
      - name: Install C++ toolchain (clang-22 from apt.llvm.org)
        run: |
          set -euo pipefail
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm22.list >/dev/null
          sudo apt-get update
          mkdir -p ~/llvm-cache
          if [ -z "$(ls -A ~/llvm-cache 2>/dev/null)" ]; then
            sudo apt-get install -y --download-only \
              -o Dir::Cache::archives="${HOME}/llvm-cache" \
              clang-22 clang-tidy-22 libstdc++-14-dev
            sudo chown -R "$(id -u):$(id -g)" ~/llvm-cache
          fi
          sudo dpkg -i ~/llvm-cache/*.deb || sudo apt-get -f install -y

      # The bundle ships install.fish / env.fish; with fish on PATH the
      # validator also runs the fish installer, checks bash/fish recipe
      # parity, and sources env.fish — the multi-shell divergence class the
      # v4.0.0 review caught by hand.
      - name: Install fish (recipe-parity leg of the bundle validation)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fish

      # FETCHCONTENT_BASE_DIR for the C++ consumer configure: without it every
      # run re-downloads nlohmann/json + yaml-cpp + OpenXLSX into the per-run
      # temp tree.  Keyed on cpp/CMakeLists.txt, which pins the dependency
      # versions (the bundled binding is staged from the same tree).
      - name: Cache C++ FetchContent deps (bundle consumer)
        uses: actions/cache@v6
        with:
          path: ~/fetchcontent-cache
          key: bundle-cpp-deps-${{ runner.os }}-${{ hashFiles('cpp/CMakeLists.txt') }}

      - name: Validate the bundle across the compiled bindings (gates publish)
        run: |
          set -euo pipefail
          python/.venv/bin/python3 -m tools.bundle_validate dist/aletheia.tar.gz \
            --require cpp,go,rust \
            --fetchcontent-cache "${HOME}/fetchcontent-cache"

      # ── Native packages (.deb + .rpm) over the validated payload ────────────
      # nfpm is installed SHA-pinned exactly like cosign (pin recorded in
      # packaging/nfpm.yaml's header comment — keep the two in sync).  rpm is
      # installed for the `shake packages` .rpm payload self-check and the
      # structural check below.
      - name: Install nfpm (SHA-pinned) + rpm
        env:
          NFPM_VERSION: '2.47.0'
          NFPM_SHA256: '0660ca602b2d2d2ae4781a06c692b3eeb9d437ffea05b831d76e41f4a3188783'
        run: |
          set -euo pipefail
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 3 -o /tmp/nfpm.tar.gz \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          echo "${NFPM_SHA256}  /tmp/nfpm.tar.gz" | sha256sum -c -
          tar -C /tmp -xzf /tmp/nfpm.tar.gz nfpm
          sudo install -m 0755 /tmp/nfpm /usr/local/bin/nfpm
          rm /tmp/nfpm /tmp/nfpm.tar.gz
          nfpm --version
          sudo apt-get install -y --no-install-recommends rpm

      # `shake packages` re-needs `dist` (a Shake phony re-runs), so the
      # tarball is rebuilt + re-signed here.  That is sound because the dist
      # tarball is byte-reproducible for a given commit + toolchain (commit-
      # epoch mtimes, `gzip -n`, sorted entries): the bundle the validator
      # just exercised is bit-identical to the one published below, and the
      # fresh signature set is what the complete self-verify loop checks.
      # The proof gates re-run warm off the cached .agdai from the first
      # dist.  The packages themselves are hash-pinned per release (.sha256
      # sidecar + keyless signature each), NOT bit-reproducible end-to-end —
      # see the reproducibility note on the Shakefile `packages` rule.
      - name: Build + keyless-sign the native packages (.deb + .rpm)
        env:
          ALETHEIA_COSIGN_KEYLESS: '1'
        run: cabal run shake -- packages

      # A partial verify loop is the classic gate-that-cannot-fail bug: every
      # signed artifact must verify against THIS workflow's OIDC identity or
      # nothing is published.  The count assertion keeps the loop honest — a
      # glob that matches nothing would otherwise verify nothing and pass.
      - name: Self-verify EVERY signed artifact (gates publish)
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(dist/aletheia.tar.gz dist/*.deb dist/*.rpm)
          if [ "${#artifacts[@]}" -ne 3 ]; then
            echo "expected exactly 3 signed artifacts (tarball + .deb + .rpm), found ${#artifacts[@]}: ${artifacts[*]}" >&2
            exit 1
          fi
          for artifact in "${artifacts[@]}"; do
            cosign verify-blob \
              --certificate "${artifact}.crt" \
              --signature "${artifact}.sig" \
              --certificate-identity "https://github.com/${GITHUB_WORKFLOW_REF}" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "${artifact}"
            echo "Self-verify OK: ${artifact}"
          done

      # Functional gate for the .deb: a real `dpkg -i` on this runner, then
      # the exact consumer chain the package README promises — source
      # /opt/aletheia/env.sh from a foreign cwd, install the packaged Python
      # binding, dlopen the installed .so — then clean removal.  The .rpm
      # gets a structural payload check only: a dnf-container install smoke
      # is out of scope for this lane (the `shake packages` self-check has
      # already proven both formats pack the same contents map, and the .deb
      # leg exercises those payload bytes functionally).
      - name: Package install smoke (.deb) + payload structural check (.rpm)
        run: |
          set -euo pipefail
          sudo dpkg -i dist/aletheia_*_amd64.deb
          test -f /opt/aletheia/lib/libaletheia-ffi.so
          (
            cd /tmp
            # shellcheck disable=SC1091
            source /opt/aletheia/env.sh
            case "${ALETHEIA_LIB}" in
              /opt/aletheia/lib/*) : ;;
              *) echo "ALETHEIA_LIB does not point into the installed package: ${ALETHEIA_LIB}" >&2; exit 1 ;;
            esac
            # The packaged Python binding is pure-Python and lives read-only under
            # /opt; consume it in place via PYTHONPATH — the recipe install.sh
            # prints for a package install.  `pip install /opt/...` cannot work
            # here: pip builds a wheel in the root-owned, unwritable source dir.
            export PYTHONPATH="/opt/aletheia/bindings/python${PYTHONPATH:+:$PYTHONPATH}"
            python3.14 -c 'import aletheia; from aletheia import FFIBackend, AletheiaClient; FFIBackend(); AletheiaClient(); print("deb smoke OK: dpkg -i -> env.sh + PYTHONPATH -> .so load -> client")'
          )
          sudo dpkg -r aletheia
          if [ -e /opt/aletheia ]; then
            echo "dpkg -r left /opt/aletheia behind" >&2
            exit 1
          fi
          listing="$(rpm -qlp dist/aletheia-*.x86_64.rpm)"
          test -n "${listing}"
          for entry in /opt/aletheia/lib/libaletheia-ffi.so /opt/aletheia/env.sh /opt/aletheia/env.fish /opt/aletheia/bindings/python/pyproject.toml; do
            grep -qx "${entry}" <<<"${listing}"
          done
          echo "rpm payload listing OK"

      # ── Runtime container image (built + verified BEFORE any publish) ───────
      # The Dockerfile's throwaway verify stages make this build the gate:
      # it fails unless the bundled Go consumer builds AND runs (dlopens the
      # image's kernel), and the bundled Rust crate + C++ binding (clang-22)
      # build against the image's own /opt/aletheia.  The push to GHCR
      # happens only after the Release publish succeeds, further below.
      - name: Build the runtime image (in-build cross-binding verification)
        run: docker build -t aletheia:release -f Dockerfile.runtime .

      - name: Publish the GitHub Release (draft; tag pushes only)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Idempotent: a re-run of the same tag re-uploads the assets rather
          # than failing on an already-existing release.  Published as a DRAFT —
          # the maintainer reviews, then flips it public.
          #
          # A keyless release is verified against the workflow's OIDC IDENTITY
          # (the .crt + the identity in RELEASE.md), NOT keys/cosign.pub — so
          # cosign.pub is deliberately NOT a release asset here (shipping it
          # would invite a --key verify that cannot succeed on a keyless sig).
          #
          # The package names carry the cabal version, which is four-component
          # (e.g. `4.0.0.0` for tag v4.0.0) — hence the globs rather than a
          # name computed from the three-component tag.  The self-verify loop
          # above has already asserted exactly one .deb and one .rpm exist.
          assets=(
            dist/aletheia.tar.gz
            dist/aletheia.tar.gz.sha256
            dist/aletheia.tar.gz.sig
            dist/aletheia.tar.gz.crt
          )
          for pkg in dist/*.deb dist/*.rpm; do
            assets+=("${pkg}" "${pkg}.sha256" "${pkg}.sig" "${pkg}.crt")
          done
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --draft \
              --title "Aletheia ${GITHUB_REF_NAME}" \
              --notes "Keyless-signed (Sigstore) release: distribution tarball, .deb/.rpm packages, and the container image on GHCR. Verify per docs/development/RELEASE.md § Verifying release artifacts."
          fi

      # GHCR push runs LAST (see the ordering note at the top of this file):
      # the image was already built + verified above; a failure here is
      # retryable idempotently (docker push and `gh release upload --clobber`
      # both converge on re-run).  The digest — not a tag — is what gets
      # keyless-signed: tags are movable, digests are content-addressed.
      # Maintainer note: the FIRST push creates the GHCR package PRIVATE; the
      # one-time visibility flip to Public is a manual step (RELEASE.md
      # § Container image on GHCR).
      - name: Push the runtime image to GHCR + keyless-sign the digest (tag pushes only)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # GHCR requires a lowercase namespace; the repo owner is `Jaetan`.
          image="ghcr.io/$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')/aletheia"
          version="${GITHUB_REF_NAME#v}"
          echo "${GH_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          docker tag aletheia:release "${image}:${version}"
          docker tag aletheia:release "${image}:latest"
          docker push "${image}:${version}"
          docker push "${image}:latest"
          # Resolve the content-addressed digest the registry assigned, then
          # sign THAT (both tags point at the same digest).
          digest="$(docker inspect --format '{{range .RepoDigests}}{{println .}}{{end}}' "${image}:${version}" \
            | grep -m1 "^${image}@sha256:")"
          test -n "${digest}"
          cosign sign --yes "${digest}"
          echo "Pushed + keyless-signed ${digest}"
