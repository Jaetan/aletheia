#
# Server-side full correctness sweep for PR enforcement — the un-bypassable
# backstop the local-first model (run_ci + opt-in pre-push hook) lacks.
# See docs/development/BRANCH_PR_HYGIENE.md.  This workflow ENFORCES nothing
# until `main` branch protection marks it a required status check; until then
# it is advisory.  The first real runs will shake out toolchain setup (the
# C++/LLVM lane is the expected first red — iterate to green BEFORE requiring).

name: Full CI sweep (PR enforcement)

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: full-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  full-sweep:
    name: tools/run_ci.py (all gates)
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      GHC_VERSION: '9.6.7'
      AGDA_VERSION: '2.8.0'
      STDLIB_VERSION: 'v2.3'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure a local `main` ref for `git diff main...HEAD`
        run: git fetch --no-tags origin +refs/heads/main:refs/heads/main || true

      - name: Set up GHC + cabal
        run: |
          set -euo pipefail
          # Pin cabal to the legacy ~/.cabal layout.  cabal 3.12 otherwise
          # defaults to the XDG store (~/.local/state/cabal/store), which
          # mismatches this job's cache path, PATH (~/.cabal/bin), and the
          # IWYU reader's _store_package_db() (it links Agda from
          # ~/.cabal/store/ghc-<ver>/package.db).  Export for later steps too.
          echo "CABAL_DIR=${HOME}/.cabal" >> "${GITHUB_ENV}"
          export CABAL_DIR="${HOME}/.cabal"
          # The runner ships a root-owned ghcup (/usr/local/.ghcup), so ghcup's
          # attempts to refresh its own cache-file timestamps warn with
          # "setFileTimes: permission denied" — benign but noisy, which trains
          # readers to ignore the log.  Take ownership first so the warning
          # disappears and real warnings stay meaningful.  Tolerant: never fail
          # the build over log hygiene if the path differs on a future runner.
          sudo chown -R "$(id -un):$(id -gn)" /usr/local/.ghcup 2>/dev/null || true
          ghcup install ghc "${GHC_VERSION}" --set
          ghcup install cabal 3.12.1.0 --set
          cabal update
          echo "${HOME}/.cabal/bin" >> "${GITHUB_PATH}"
          echo "${HOME}/.ghcup/bin" >> "${GITHUB_PATH}"

      # Caches the prebuilt Agda library + executable so only the FIRST run
      # builds Agda (~15-20 min on the 4-core runner); later runs restore it
      # and `cabal install Agda` becomes a fast no-op.  Split restore/save (not
      # the combined `actions/cache`) because the combined action only saves on
      # job SUCCESS — every failed iteration would otherwise re-build Agda.  The
      # save runs right after the build, BEFORE the sweep, so a later gate
      # failure still persists the build; placing it pre-sweep also means it is
      # skipped automatically if `cabal install` itself fails (no broken cache).
      # Key is -v2: the first run cached an empty store (cabal used the XDG
      # location before CABAL_DIR was pinned) and cache keys are immutable.
      - name: Restore cabal store (Agda library + executable + deps)
        id: cabal-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            ~/.cabal/bin
          key: cabal-${{ runner.os }}-ghc${{ env.GHC_VERSION }}-agda${{ env.AGDA_VERSION }}-v2

      - name: Install Agda ${{ env.AGDA_VERSION }} (binary + store library)
        run: cabal install "Agda-${AGDA_VERSION}" --overwrite-policy=always

      - name: Save cabal store (persists the Agda build even if a later gate fails)
        if: steps.cabal-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            ~/.cabal/bin
          key: cabal-${{ runner.os }}-ghc${{ env.GHC_VERSION }}-agda${{ env.AGDA_VERSION }}-v2

      - name: Cache agda-stdlib ${{ env.STDLIB_VERSION }}
        uses: actions/cache@v5
        with:
          path: ~/.agda/agda-stdlib
          key: agda-stdlib-${{ env.STDLIB_VERSION }}

      - name: Install + register agda-stdlib ${{ env.STDLIB_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p ~/.agda
          if [ ! -d ~/.agda/agda-stdlib/.git ]; then
            git clone --depth 1 --branch "${STDLIB_VERSION}" \
              https://github.com/agda/agda-stdlib.git ~/.agda/agda-stdlib
          fi
          echo "${HOME}/.agda/agda-stdlib/standard-library.agda-lib" > ~/.agda/libraries
          echo "standard-library" > ~/.agda/defaults

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Create the dev venv (python/.venv)
        run: |
          set -euo pipefail
          python3.14 -m venv python/.venv
          python/.venv/bin/pip install --upgrade pip
          python/.venv/bin/pip install -e 'python/.[dev]'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          # The Go modules live under go/ and go/excel/, not the repo root, so
          # setup-go's default go.sum probe misses and logs "Restore cache
          # failed: Dependencies file is not found ... Supported file pattern:
          # go.sum".  Point it at the real module checksums so module caching
          # works and the benign-but-noisy warning goes away.
          cache-dependency-path: |
            go/go.sum
            go/excel/go.sum

      # The ubuntu-24.04 runner ships rustup; ensure a stable toolchain with the
      # clippy + rustfmt components so run_ci's Rust lane (cargo test / clippy /
      # fmt --check) has everything it needs. A plain `run:` step (no third-party
      # action) keeps the action-pin policy untouched.
      - name: Set up Rust (stable + clippy + rustfmt)
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt --no-self-update
          rustup default stable
          rustc --version && cargo --version

      # ubuntu-24.04 pre-installs only clang ≤19, but the supported toolchain is
      # the latest stable Clang (22 — see cpp/CMakeLists.txt + AGENTS/cpp.md), so
      # install clang-22 from apt.llvm.org.  libstdc++-14-dev provides the C++23
      # libstdc++ (std::expected / std::format) clang auto-selects; g++ is NOT
      # installed (cgo + GHC use cc/gcc-13).  run_ci invokes clang-22 /
      # clang-tidy-22 explicitly and routes clang-format through the venv-pinned
      # binary, so no update-alternatives is needed.  Adjust on red runs.
      - name: Cache clang-22 .debs (Clang is a large download)
        uses: actions/cache@v5
        with:
          path: ~/llvm-cache
          key: clang22-noble-v1
      - name: Install C++ toolchain (clang-22 from apt.llvm.org)
        run: |
          set -euo pipefail
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm22.list >/dev/null
          sudo apt-get update
          mkdir -p ~/llvm-cache
          if [ -z "$(ls -A ~/llvm-cache 2>/dev/null)" ]; then
            # Cache miss: download clang-22 + deps into the user-owned cache dir.
            sudo apt-get install -y --download-only \
              -o Dir::Cache::archives="${HOME}/llvm-cache" \
              clang-22 clang-tidy-22 libstdc++-14-dev
            sudo chown -R "$(id -u):$(id -g)" ~/llvm-cache
          fi
          sudo dpkg -i ~/llvm-cache/*.deb || sudo apt-get -f install -y

      # Caches the CMake FetchContent dependencies (json / yaml-cpp / OpenXLSX
      # / Catch2) for all three C++ build dirs.  Without it, every run
      # re-downloads each tarball into each build tree — slow and exposed to
      # transient source-server errors (a 504 fetching OpenXLSX failed the
      # ctest step on the first real run).  Keyed on CMakeLists.txt, which
      # pins the dependency versions, so a bump invalidates the cache.
      - name: Cache C++ FetchContent deps
        uses: actions/cache@v5
        with:
          path: |
            cpp/build/_deps
            cpp/build-tidy/_deps
            cpp/build-ubsan/_deps
          key: cpp-deps-${{ runner.os }}-${{ hashFiles('cpp/CMakeLists.txt') }}

      # actionlint is the one GHA meta-check run_ci runs only when the binary is
      # present — it is an OPTIONAL local tool (gated behind `shutil.which`, see
      # CLAUDE.md), so without it installed here the enforced sweep silently
      # SKIPS it ("actionlint skipped (binary not installed)").  The sibling
      # meta-checks (check-action-pins, check-workflow-permissions) run
      # unconditionally via `python -m`, so actionlint was the lone hole in the
      # required gate's GHA coverage.  Install it on PATH so run_ci's actionlint
      # step runs.  SHA-pinned + verified, mirroring gha-checks.yml's install
      # (CICD-1.7: the tool that enforces the SHA-pin policy must itself be
      # fetched verifiably).  Keep ACTIONLINT_VERSION / ACTIONLINT_SHA256 in
      # sync with .github/workflows/gha-checks.yml.
      - name: Install actionlint (so run_ci's actionlint gate runs, not skips)
        env:
          ACTIONLINT_VERSION: '1.7.7'
          ACTIONLINT_SHA256: '023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757'
        run: |
          set -euo pipefail
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 3 -O \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" | sha256sum -c -
          tar xzf "actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" actionlint
          sudo install -m 0755 actionlint /usr/local/bin/actionlint
          actionlint --version

      # --iwyu-all runs the import gate over the WHOLE tree (not just the PR
      # diff) — airtight against cross-file deadness, the merge-gate scope.
      # The local pre-push hook keeps the faster --diff default.
      - name: Run the full offline correctness sweep (tools/run_ci.py)
        run: python/.venv/bin/python3 -m tools.run_ci --iwyu-all
